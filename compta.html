<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDM Admin - Comptabilité</title>
<link rel="stylesheet" href="app.css">
<script type="module" src="compta.js"></script>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>PDM ADMIN</h2>

    <a href="dashboard.html">📊 Dashboard</a>
    <a href="clients.html">👥 Clients</a>
    <a href="stock.html">📦 Stock</a>
    <a href="ventes.html">💰 Ventes</a>
    <a href="vehicles.html">🚗 Véhicules</a>
    <a href="partenariats.html">🤝 Partenaires</a>
    <a class="active" href="compta.html">📒 Comptabilité</a>

    <button id="logoutBtn">Déconnexion</button>
  </aside>

  <!-- MAIN -->
  <main class="content">

    <h1>Comptabilité</h1>

    <div class="stats">
      <div class="card">
        <span>Total revenus</span>
        <strong id="totalRevenue">$0</strong>
      </div>

      <div class="card">
        <span>Total dépenses</span>
        <strong id="totalExpenses">$0</strong>
      </div>

      <div class="card">
        <span>Bénéfice</span>
        <strong id="totalProfit">$0</strong>
      </div>
    </div>

    <div class="card">
      <h3>Historique</h3>

      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Motif</th>
            <th>Type</th>
            <th>Montant</th>
          </tr>
        </thead>

        <tbody id="cashTable">
          <tr><td colspan="4">Chargement…</td></tr>
        </tbody>
      </table>
    </div>

  </main>

</div>

</body>
</html>
