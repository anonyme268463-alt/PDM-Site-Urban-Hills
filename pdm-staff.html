<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>PDM Staff</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="./favicon.png?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body{margin:0;background:#050608;color:#fff;font-family:'Poppins',system-ui,-apple-system,Segoe UI,Roboto,Arial;background-image:radial-gradient(circle at 70% 20%, rgba(212, 175, 55, 0.08), transparent 50%)}
    .wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
    .card{width:min(450px,100%);border:1px solid rgba(255,255,255,.08);border-radius:24px;background:rgba(17,19,25,0.85);padding:40px;backdrop-filter:blur(10px);box-shadow:0 20px 50px rgba(0,0,0,0.7)}
    h1{margin:0 0 8px;font-size:24px;letter-spacing:.05em;text-transform:uppercase;font-weight:800;text-align:center}
    p{margin:0 0 30px;color:rgba(255,255,255,.5);font-size:14px;text-align:center}
    input{width:100%;box-sizing:border-box;margin:0 0 16px;padding:14px 18px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,0.3);color:#fff;outline:none;transition:all .2s ease}
    input:focus{border-color:#d4af37;box-shadow:0 0 0 3px rgba(212,175,55,0.1)}
    button{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#d4af37,#f1d58b);color:#070709;font-weight:700;cursor:pointer;transition:all .2s ease;text-transform:uppercase;letter-spacing:1px}
    button:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(212,175,55,0.3)}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row button{flex:1}
    .msg{margin-top:12px;font-size:13px;color:rgba(241,213,139,.85)}
    .err{color:#ffb4b4}
    .small{margin-top:10px;font-size:12px;color:rgba(255,255,255,.55)}
    a{color:rgba(241,213,139,.95);text-decoration:none}

    .toast{
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      background: rgba(10,10,12,.75);
      border: 1px solid rgba(212,175,55,.35);
      box-shadow: 0 12px 30px rgba(0,0,0,.45);
      backdrop-filter: blur(10px);
      color: #f6f6f6;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      z-index: 9999;
    }
    .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>
  <div class="wrap">
    <div class="card">
      <h1>Accès Staff</h1>
      <p>Connexion réservée au personnel Premium Deluxe Motorsport.</p>

      <input id="email" type="text" placeholder="Email" autocomplete="username">
      <input id="password" type="password" placeholder="Mot de passe" autocomplete="current-password">

      <div class="row">
        <button id="loginBtn" type="button">Se connecter</button>
      </div>

      <div id="msg" class="msg"></div>
      <div class="small">Si tu n’as pas d’accès, contacte le PDG.</div>
    </div>
  </div>

  <script type="module">
    import { auth } from "./config.js";
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";

    let redirected = false;

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.innerHTML = message;
      toast.classList.add("show");
      window.clearTimeout(toast.__t);
      toast.__t = window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

    const msg = document.getElementById("msg");
    const email = document.getElementById("email");
    const password = document.getElementById("password");

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        localStorage.removeItem("pdm_logged_in");
        return;
      }
      if (redirected) return;
      redirected = true;

      localStorage.setItem("pdm_logged_in", "true");
      const displayName = user.displayName || user.email || user.uid.slice(0, 8);
      showToast(`UID reconnu. Bienvenue <strong>${displayName}</strong>`);
      setTimeout(() => (window.location.href = "./dashboard.html"), 900);
    });

    document.getElementById("loginBtn").addEventListener("click", async () => {
      msg.textContent = "";
      msg.classList.remove("err");
      try {
        await signInWithEmailAndPassword(auth, email.value.trim(), password.value);
        localStorage.setItem("pdm_logged_in", "true");
        window.location.href = "./dashboard.html";
      } catch (e) {
        msg.textContent = "Connexion refusée. Vérifie l’identifiant et le mot de passe.";
        msg.classList.add("err");
      }
    });
  </script>
</body>
</html>
