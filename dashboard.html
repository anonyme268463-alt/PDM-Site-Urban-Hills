<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Premium Deluxe Motorsport</title>
    <link rel="stylesheet" href="app.css">
    <link rel="icon" href="favicon-1.jpg" type="image/jpg">
</head>
<body>
    <!-- HEADER (commun à toutes les pages) -->
    <header class="header">
        <div class="header-left">
            <h1>PDM Urban Hills</h1>
            <span class="subtitle">Premium Deluxe Motorsport</span>
        </div>
        <div class="header-right">
            <button class="btn-logout" onclick="logout()">Déconnexion</button>
        </div>
    </header>

    <!-- SIDEBAR (menu commun à toutes les pages) -->
    <aside class="sidebar">
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-link active">Dashboard</a>
            <a href="clients-1.html" class="nav-link">Clients</a>
            <a href="vehicles.html" class="nav-link">Véhicules</a>
            <a href="stock.html" class="nav-link">Stock</a>
            <a href="ventes-2.html" class="nav-link">Ventes</a>
            <a href="partenariats.html" class="nav-link">Partenariats</a>
            <a href="compta.html" class="nav-link">Comptabilité</a>
        </nav>
    </aside>

    <!-- CONTENU PRINCIPAL (change selon la page) -->
    <main class="main-content">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Véhicules</h3>
                <div class="stat-number">--</div>
            </div>
            <div class="stat-card">
                <h3>Clients Actifs</h3>
                <div class="stat-number">--</div>
            </div>
            <div class="stat-card">
                <h3>Chiffre d'Affaires</h3>
                <div class="stat-number">--</div>
            </div>
            <div class="stat-card">
                <h3>Stock Disponible</h3>
                <div class="stat-number">--</div>
            </div>
        </div>

        <div class="content-section">
            <h2>Activité récente</h2>
            <div class="table-container">
                <!-- Tableau des dernières transactions/clients/ventes -->
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Client</th>
                            <th>Véhicule</th>
                            <th>Montant</th>
                            <th>Statut</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Les lignes seront remplies par JavaScript -->
                        <tr><td colspan="5">Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script type="module" src="app.js"></script>
    <script>
        // Fonction spécifique au dashboard (sera appelée au chargement)
        window.addEventListener('load', function() {
            loadDashboard(); // À implémenter dans app.js
        });
    </script>
</body>
</html>
