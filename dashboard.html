<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>PDM Admin - Dashboard</title>
  <link rel="stylesheet" href="app.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="module" src="dashboard.js"></script>
</head>
<body>

<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-title">PDM <span>ADMIN</span></div>
      <div class="brand-sub">Urban Hills</div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-link active" href="dashboard.html">
        <span>Dashboard</span>
      </a>
      <a class="nav-link" href="clients.html">
        <span>Clients</span>
      </a>
      <a class="nav-link" href="stock.html">
        <span>Stock</span>
      </a>
      <a class="nav-link" href="ventes.html">
        <span>Ventes</span>
      </a>
      <a class="nav-link" href="vehicles.html">
        <span>Véhicules</span>
      </a>
      <a class="nav-link" href="partenariats.html">
        <span>Partenaires</span>
      </a>
      <a class="nav-link" href="compta.html">
        <span>Comptabilité</span>
      </a>
      <a class="nav-link" href="catalogue.html">
        <span>Catalogue</span>
      </a>
      <a class="nav-link" href="gestion.html">
        <span>Gestion</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button id="logoutBtn" class="btn btn-gold w-full">Déconnexion</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <div class="page-info">
        <h1>Vue Globale</h1>
        <p>Statistiques et aperçu des activités récentes</p>
      </div>
    </header>

    <div class="content-body">
      <div class="stats-grid">
        <div class="card stat-card">
          <div class="card-title">CA TOTAL</div>
          <div class="stat-value" id="caTotal">$0</div>
        </div>
        <div class="card stat-card">
          <div class="card-title">PROFIT TOTAL</div>
          <div class="stat-value" id="profitTotal">$0</div>
        </div>
        <div class="card stat-card">
          <div class="card-title">NOMBRE DE VENTES</div>
          <div class="stat-value" id="salesCount">0</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Dernières ventes</div>
        </div>
        <div class="table-container">
          <table class="table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Client</th>
                <th>Modèle</th>
                <th>Vente</th>
                <th>Profit</th>
              </tr>
            </thead>
            <tbody id="lastSales">
              <tr><td colspan="5" class="muted">Chargement...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

</body>
</html>
