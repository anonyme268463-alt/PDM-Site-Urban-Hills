<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>PDM Admin - Dashboard</title>
  <link rel="stylesheet" href="app.css">
  <script type="module" src="dashboard.js"></script>
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <h2>PDM ADMIN</h2>
    <a class="active" href="dashboard.html">📊 Dashboard</a>
    <a href="clients.html">👥 Clients</a>
    <a href="stock.html">📦 Stock</a>
    <a href="ventes.html">💰 Ventes</a>
    <a href="vehicles.html">🚗 Véhicules</a>
    <a href="partenariats.html">🤝 Partenaires</a>
    <a href="compta.html">📒 Comptabilité</a>
    <a href="catalogue.html">📚 Catalogue</a>
    <a href="gestion.html">⚙️ Gestion</a>
    <button id="logoutBtn">Déconnexion</button>
  </aside>

  <main class="content">

    <h1>Vue Globale</h1>

    <div class="cards">
      <div class="card">
        <div>CA TOTAL</div>
        <h2 id="caTotal">$0</h2>
      </div>

      <div class="card">
        <div>PROFIT TOTAL</div>
        <h2 id="profitTotal">$0</h2>
      </div>

      <div class="card">
        <div>NOMBRE DE VENTES</div>
        <h2 id="salesCount">0</h2>
      </div>
    </div>

    <h2 style="margin-top:40px;">Dernières ventes</h2>

    <table class="table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Client</th>
          <th>Modèle</th>
          <th>Vente</th>
          <th>Profit</th>
        </tr>
      </thead>
      <tbody id="lastSales">
        <tr><td colspan="5">Chargement...</td></tr>
      </tbody>
    </table>

  </main>

</div>

</body>
</html>
