<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Outil de Migration PDM</title>
    <style>
        body { font-family: sans-serif; background: #050608; color: #fff; padding: 2rem; }
        .card { background: #111319; padding: 2rem; border-radius: 8px; border: 1px solid #d4af37; max-width: 600px; margin: auto; }
        button { background: #d4af37; color: #000; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 20px; font-family: monospace; height: 300px; overflow-y: auto; background: #000; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Migration du Catalogue PDM</h1>
        <p>Cet outil va importer les 425 véhicules extraits de l'ancienne version vers ta base Firestore <strong>pdm-urban-hills</strong>.</p>
        <p style="color: #f1d58b;">Attention : Cette opération peut prendre quelques minutes.</p>
        <button onclick="migrate()">Lancer l'importation</button>
        <div id="status">En attente...</div>
    </div>
    <script type="module" src="migrate_vehicles.js"></script>
</body>
</html>
