<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>PDM Admin - Partenaires</title>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="app.css">
  <script type="module" src="partenariats.js"></script>
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <h2>PDM ADMIN</h2>

    <a href="dashboard.html">Dashboard</a>
    <a href="clients.html">Clients</a>
    <a href="stock.html">Stock</a>
    <a href="ventes.html">Ventes</a>
    <a href="vehicles.html">Vehicules</a>
    <a class="active" href="partenariats.html">Partenaires</a>
    <a href="compta.html">Comptabilite</a>
    <a href="catalogue.html">Catalogue</a>
    <a href="gestion.html">Gestion</a>

    <button id="logoutBtn">Deconnexion</button>
  </aside>

  <main class="content">
    <h1>Gestion Partenaires</h1>

    <div class="card" style="margin-bottom:14px; display:flex; gap:10px; align-items:center;">
      <input id="search" type="text" placeholder="Rechercher un partenaire (nom)">
      <button id="refreshBtn" class="btn">Rafraichir</button>
      <button id="addPartnerBtn" class="btn btn-gold">+ Partenaire</button>
    </div>

    <div class="cards" style="margin-bottom:14px;">
      <div class="card">
        <div>Partenaires</div>
        <h2 id="statPartners">0</h2>
      </div>
      <div class="card">
        <div>Membres (total)</div>
        <h2 id="statMembers">0</h2>
      </div>
      <div class="card">
        <div>Actifs</div>
        <h2 id="statActive">0</h2>
      </div>
    </div>

    <table class="table">
      <thead>
        <tr>
          <th>Nom</th>
          <th>Actif</th>
          <th>Clients</th>
          <th>Cree</th>
          <th>Maj</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="partnersTable">
        <tr><td colspan="6">Chargement...</td></tr>
      </tbody>
    </table>
  </main>

</div>

<!-- MODAL PARTNER -->
<div id="partnerModal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="pmTitle">Partenaire</div>
      <div class="close" id="pmClose">X</div>
    </div>

    <div class="hr"></div>

    <div class="card" style="margin-bottom:12px;">
      <div style="display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap;">
        <div style="flex:1; min-width:220px;">
          <div style="font-size:12px; opacity:.8; margin-bottom:6px;">Nom</div>
          <input id="pmName" type="text" placeholder="Benny's">
        </div>

        <div style="display:flex; gap:10px; align-items:center;">
          <label style="display:flex; gap:8px; align-items:center;">
            <input id="pmActive" type="checkbox">
            Actif
          </label>
        </div>

        <div style="margin-left:auto; display:flex; gap:10px;">
          <button id="pmSave" class="btn btn-gold">Enregistrer</button>
          <button id="pmDelete" class="btn btn-danger">Supprimer</button>
        </div>
      </div>
      <div style="margin-top:8px; font-size:12px; opacity:.75;">
        ID: <span id="pmId">-</span>
      </div>
    </div>

    <div class="hr"></div>

    <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
      <h2 style="margin:0;">Clients & taux</h2>
      <button id="addMemberBtn" class="btn btn-gold">+ Ajouter</button>
    </div>

    <table class="table" style="margin-top:10px;">
      <thead>
        <tr>
          <th>Client</th>
          <th>ClientId</th>
          <th>Taux</th>
          <th>Cree</th>
          <th>Maj</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="membersTable">
        <tr><td colspan="6">Chargement...</td></tr>
      </tbody>
    </table>

    <div class="hr"></div>

    <div style="display:flex; justify-content:flex-end; gap:10px;">
      <button id="pmCancel" class="btn">Fermer</button>
    </div>

  </div>
</div>

</body>
</html>
