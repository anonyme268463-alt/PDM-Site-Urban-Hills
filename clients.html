<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>PDM Admin - Clients</title>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="app.css">
  <script type="module" src="clients.js"></script>
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <h2>PDM ADMIN</h2>

    <a href="dashboard.html">Dashboard</a>
    <a class="active" href="clients.html">Clients</a>
    <a href="stock.html">Stock</a>
    <a href="ventes.html">Ventes</a>
    <a href="vehicles.html">Vehicules</a>
    <a href="partenariats.html">Partenaires</a>
    <a href="compta.html">Comptabilite</a>
    <a href="catalogue.html">Catalogue</a>
    <a href="gestion.html">Gestion</a>

    <button id="logoutBtn">Deconnexion</button>
  </aside>

  <main class="content">
    <h1>Gestion Clients</h1>

    <div class="card" style="margin-bottom:14px;">
      <input id="search" type="text" placeholder="Rechercher par nom ou telephone">
    </div>

    <table class="table">
      <thead>
        <tr>
          <th>Nom</th>
          <th>Telephone</th>
          <th>Permis</th>
          <th>Voiture</th>
          <th>Moto</th>
          <th>Camion</th>
          <th>Achats</th>
          <th>Total</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="clientsTable">
        <tr><td colspan="9">Chargement...</td></tr>
      </tbody>
    </table>
  </main>

</div>

<div id="clientModal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="mTitle">Fiche client</div>
      <div class="close" id="closeModal">X</div>
    </div>

    <div class="hr"></div>

    <div class="cards">
      <div class="card">
        <div>Total depense</div>
        <h2 id="mTotal">$0</h2>
      </div>
      <div class="card">
        <div>Profit genere</div>
        <h2 id="mProfit">$0</h2>
      </div>
      <div class="card">
        <div>Nombre achats</div>
        <h2 id="mCount">0</h2>
      </div>
    </div>

    <div class="hr"></div>

    <table class="table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Modele</th>
          <th>Achat</th>
          <th>Vente</th>
          <th>Profit</th>
        </tr>
      </thead>
      <tbody id="mSales">
        <tr><td colspan="5">Chargement...</td></tr>
      </tbody>
    </table>

  </div>
</div>

</body>
</html>
