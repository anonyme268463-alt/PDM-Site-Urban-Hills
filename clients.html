<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDM Admin - Clients</title>
<link rel="stylesheet" href="app.css">
<style>
:root {
  --bg: #07080c;
  --card: rgba(10,12,18,.62);
  --text: rgba(255,255,255,.88);
  --muted: rgba(255,255,255,.55);
  --gold: #f6d26b;
}

* { box-sizing: border-box; }
body { 
  margin: 0; 
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg); 
  color: var(--text);
}

.app { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
.sidebar {
  width: 250px;
  background: rgba(10,12,18,.5);
  border-radius: 16px;
  padding: 20px;
  height: fit-content;
}

.brand { font-weight: 800; font-size: 18px; margin-bottom: 20px; }
.nav a {
  display: block;
  padding: 12px;
  margin-bottom: 8px;
  background: rgba(255,255,255,.05);
  border-radius: 12px;
  color: inherit;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,.1);
}

.nav a:hover { background: rgba(255,255,255,.1); }
.nav a.active { background: rgba(246,210,107,.2); border-color: var(--gold); }

.main { flex: 1; }
.card {
  background: var(--card);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 20px;
  border: 1px solid rgba(255,255,255,.1);
}

.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-bottom: 24px; }
.input { 
  padding: 12px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 12px;
  color: var(--text);
  font-size: 16px;
}

.input::placeholder { color: var(--muted); }
.btn { background: var(--gold); color: #111; padding: 12px 24px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; margin-left: 10px; }
.btn:hover { opacity: 0.9; }

.table { overflow: auto; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px; background: rgba(255,255,255,.05); color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,.1); }
tr:hover td { background: rgba(255,255,255,.05); }

.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #47e6a6;
  color: black;
  padding: 16px 24px;
  border-radius: 12px;
  font-weight: 600;
  display: none;
}

@media (max-width: 768px) { .app { flex-direction: column; } .sidebar { width: 100%; order: 2; } .main { order: 1; } }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand">PDM ADMIN</div>
    <nav class="nav">
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="clients.html" class="active">👥 Clients</a>
      <a href="stock.html">📦 Stock</a>
      <a href="ventes.html">💰 Ventes</a>
      <a href="vehicles.html">🚗 Véhicules</a>
      <a href="partenariats.html">🤝 Partenaires</a>
      <a href="compta.html">💼 Comptabilité</a>
    </nav>
    <button class="btn" onclick="logout()">🚪 Déconnexion</button>
  </div>

  <div class="main">
    <div class="card">
      <h1>Gestion Clients</h1>
      <p style="color: var(--muted);">Base clients avec import CSV Google Sheets</p>

      <div class="grid">
        <input class="input" id="searchClient" placeholder="🔍 Recherche nom/téléphone...">
        <input type="file" class="input" id="csvFile" accept=".csv" style="padding:12px">
        <button class="btn" onclick="addClient()">➕ Ajouter</button>
        <button class="btn" onclick="importCSV()">📥 Importer CSV</button>
      </div>
    </div>

    <div class="card">
      <h2>Base Clients</h2>
      <span style="color: var(--muted); font-size: 14px;" id="clientCount">0 clients</span>
      <div class="table">
        <table>
          <thead>
            <tr>
              <th>Nom</th>
              <th>Téléphone</th>
              <th>Permis</th>
              <th>Voiture</th>
              <th>Moto</th>
              <th>Camion</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="clientsTable">
            <tr><td colspan="7">Chargement...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 3000);
}

function updateClients() {
  document.getElementById('clientCount').textContent = `${clients.length} clients`;

  const tbody = document.getElementById('clientsTable');
  tbody.innerHTML = clients.map((client, index) => `
    <tr>
      <td>${client.name}</td>
      <td>${client.phone}</td>
      <td>${client.permis}</td>
      <td>${client.voiture}</td>
      <td>${client.moto}</td>
      <td>${client.camion}</td>
      <td>
        <button class="btn" onclick="editClient(${index})" style="padding:6px 12px;font-size:12px">✏️</button>
        <button class="btn" onclick="deleteClient(${index})" style="padding:6px 12px;font-size:12px;background:#ff4444">🗑️</button>
      </td>
    </tr>
  `).join('');
}

function addClient() {
  const name = prompt('Nom client :');
  if (!name) return;
  const phone = prompt('Téléphone :') || '';
  clients.push({
    name, phone,
    permis: prompt('Permis :') || '',
    voiture: prompt('Voiture (Oui/Non) :') || 'Non',
    moto: prompt('Moto (Oui/Non) :') || 'Non',
    camion: prompt('Camion (Oui/Non) :') || 'Non'
  });
  updateClients();
  showToast('Client ajouté !');
}

function editClient(index) {
  const client = clients[index];
  client.name = prompt('Nom :', client.name) || client.name;
  client.phone = prompt('Téléphone :', client.phone) || client.phone;
  updateClients();
  showToast('Client modifié !');
}

function deleteClient(index) {
  if (confirm('Supprimer ce client ?')) {
    clients.splice(index, 1);
    updateClients();
    showToast('Client supprimé !');
  }
}

function importCSV() {
  const file = document.getElementById('csvFile').files[0];
  if (!file) return showToast('Choisis un fichier CSV');

  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const rows = text.split('\n').map(row => row.split(','));
    // Simple CSV parser (améliorable)
    rows.slice(1).forEach(row => {
      if (row[0]) clients.push({
        name: row[0],
        phone: row[1] || '',
        permis: row[2] || '',
        voiture: row[3] || 'Non',
        moto: row[4] || 'Non',
        camion: row[5] || 'Non'
      });
    });
    updateClients();
    showToast(`${rows.length-1} clients importés !`);
  };
  reader.readAsText(file);
}

function logout() {
  showToast('Déconnexion...');
}

// Recherche
document.getElementById('searchClient').addEventListener('input', function() {
  const term = this.value.toLowerCase();
  const filtered = clients.filter(c => 
    c.name.toLowerCase().includes(term) || 
    c.phone.includes(term)
  );
  // Temporaire : remplace clients pour simplicité
  const tbody = document.getElementById('clientsTable');
  tbody.innerHTML = filtered.map(client => `
    <tr>
      <td>${client.name}</td>
      <td>${client.phone}</td>
      <td>${client.permis}</td>
      <td>${client.voiture}</td>
      <td>${client.moto}</td>
      <td>${client.camion}</td>
      <td>
        <button class="btn" onclick="editClient(clients.indexOf(${JSON.stringify(client)}))" style="padding:6px 12px;font-size:12px">✏️</button>
      </td>
    </tr>
  `).join('');
});

showToast('PDM Clients chargé !');
updateClients();
</script>
</body>
</html>
