
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PDM Admin - Stock</title>
  <link rel="stylesheet" href="app.css">
  <!-- SUPPRIME tout <style> après ! -->
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand">PDM ADMIN</div>
    <nav class="nav">
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="clients.html">👥 Clients</a>
      <a href="stock.html" class="active">📦 Stock</a>
      <a href="ventes.html">💰 Ventes</a>
      <a href="vehicles.html">🚗 Véhicules</a>
      <a href="partenariats.html">🤝 Partenaires</a>
      <a href="compta.html">💼 Comptabilité</a>
    </nav>
    <button class="btn" onclick="logout()">🚪 Déconnexion</button>
  </div>

  <div class="main">
    <div class="card">
      <h1>Ajouter / Réserver</h1>
      <p style="color: var(--muted);">Client = Réservation. Sans client = Stock.</p>

      <div class="grid">
        <input class="input" id="brandInput" placeholder="Marque (Pfister)">
        <input class="input" id="modelInput" placeholder="Modèle (Comet S2)">
        <input class="input" id="qtyInput" type="number" value="1" placeholder="Quantité">
        <input class="input" id="clientInput" placeholder="Client (optionnel)">
        <button class="btn" onclick="addItem()">➕ Ajouter</button>
      </div>
    </div>

    <div class="card">
      <h2>Stock</h2>
      <span style="color: var(--muted); font-size: 14px;" id="stockCount">0 items</span>
      <div class="table">
        <table>
          <thead>
            <tr><th>Marque</th><th>Modèle</th><th>Qté</th><th>Actions</th></tr>
          </thead>
          <tbody id="stockTable">
            <tr><td colspan="4">Aucun stock</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2>Réservations</h2>
      <span style="color: var(--muted); font-size: 14px;" id="resaCount">0 rsa</span>
      <div class="table">
        <table>
          <thead>
            <tr><th>Client</th><th>Marque</th><th>Modèle</th><th>Qté</th><th>Actions</th></tr>
          </thead>
          <tbody id="resaTable">
            <tr><td colspan="5">Aucune réservation</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 3000);
}

function updateLists() {
  document.getElementById('stockCount').textContent = `${stock.length} items`;
  document.getElementById('resaCount').textContent = `${reservations.length} rsa`;

  document.getElementById('stockTable').innerHTML = stock.map(item => `
    <tr>
      <td>${item.brand}</td>
      <td>${item.model}</td>
      <td><span class="tag ${item.qty > 1 ? 'ok' : item.qty === 1 ? 'warn' : 'danger'}">${item.qty}</span></td>
      <td>
        <button class="btn" onclick="editStock(${stock.indexOf(item)})" style="padding:6px 12px;font-size:12px">✏️</button>
        <button class="btn danger" onclick="deleteStock(${stock.indexOf(item)})" style="padding:6px 12px;font-size:12px">🗑️</button>
      </td>
    </tr>
  `).join('') || '<tr><td colspan="4">Aucun stock</td></tr>';

  document.getElementById('resaTable').innerHTML = reservations.map(item => `
    <tr>
      <td>${item.client}</td>
      <td>${item.brand}</td>
      <td>${item.model}</td>
      <td><span class="tag warn">${item.qty}</span></td>
      <td>
        <button class="btn ok" onclick="sellReservation(${reservations.indexOf(item)})" style="padding:6px 12px;font-size:12px">💰 Vente</button>
        <button class="btn" onclick="editResa(${reservations.indexOf(item)})" style="padding:6px 12px;font-size:12px">✏️</button>
        <button class="btn danger" onclick="deleteResa(${reservations.indexOf(item)})" style="padding:6px 12px;font-size:12px">🗑️</button>
      </td>
    </tr>
  `).join('') || '<tr><td colspan="5">Aucune réservation</td></tr>';
}

function addItem() {
  const brand = document.getElementById('brandInput').value.trim();
  const model = document.getElementById('modelInput').value.trim();
  const qty = parseInt(document.getElementById('qtyInput').value) || 1;
  const client = document.getElementById('clientInput').value.trim();

  if (!brand || !model) return showToast('Marque + Modèle requis !');

  if (client) {
    reservations.push({client, brand, model, qty});
    showToast('Réservation ajoutée !');
  } else {
    stock.push({brand, model, qty});
    showToast('Stock ajouté !');
  }

  // Reset form
  document.getElementById('brandInput').value = '';
  document.getElementById('modelInput').value = '';
  document.getElementById('qtyInput').value = '1';
  document.getElementById('clientInput').value = '';

  updateLists();
}

function editStock(index) {
  const item = stock[index];
  item.brand = prompt('Marque :', item.brand) || item.brand;
  item.model = prompt('Modèle :', item.model) || item.model;
  item.qty = parseInt(prompt('Qté :', item.qty)) || item.qty;
  updateLists();
  showToast('Stock modifié !');
}

function deleteStock(index) {
  if (confirm('Supprimer du stock ?')) {
    stock.splice(index, 1);
    updateLists();
    showToast('Stock supprimé !');
  }
}

function sellReservation(index) {
  if (confirm('Convertir en vente ?')) {
    const item = reservations.splice(index, 1)[0];
    showToast(`Vente ${item.model} ${item.client} !`);
    updateLists();
  }
}

function editResa(index) {
  const item = reservations[index];
  item.client = prompt('Client :', item.client) || item.client;
  item.brand = prompt('Marque :', item.brand) || item.brand;
  item.model = prompt('Modèle :', item.model) || item.model;
  item.qty = parseInt(prompt('Qté :', item.qty)) || item.qty;
  updateLists();
  showToast('Réservation modifiée !');
}

function deleteResa(index) {
  if (confirm('Annuler réservation ?')) {
    reservations.splice(index, 1);
    updateLists();
    showToast('Réservation annulée !');
  }
}

function logout() {
  showToast('Déconnexion...');
}

showToast('PDM Stock chargé !');
updateLists();
</script>
</body>
</html>
