
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDM Admin - Véhicules</title>
<style>
:root {
  --bg: #07080c;
  --card: rgba(10,12,18,.62);
  --text: rgba(255,255,255,.88);
  --muted: rgba(255,255,255,.55);
  --gold: #f6d26b;
}

* { box-sizing: border-box; }
body { 
  margin: 0; 
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg); 
  color: var(--text);
}

.app { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
.sidebar {
  width: 250px;
  background: rgba(10,12,18,.5);
  border-radius: 16px;
  padding: 20px;
  height: fit-content;
}

.brand { font-weight: 800; font-size: 18px; margin-bottom: 20px; }
.nav a {
  display: block;
  padding: 12px;
  margin-bottom: 8px;
  background: rgba(255,255,255,.05);
  border-radius: 12px;
  color: inherit;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,.1);
}

.nav a:hover { background: rgba(255,255,255,.1); }
.nav a.active { background: rgba(246,210,107,.2); border-color: var(--gold); }

.main { flex: 1; }
.card {
  background: var(--card);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 20px;
  border: 1px solid rgba(255,255,255,.1);
}

.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-bottom: 24px; }
.input { 
  padding: 12px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 12px;
  color: var(--text);
  font-size: 16px;
}

.input::placeholder { color: var(--muted); }
.btn { 
  background: var(--gold); 
  color: #111; 
  padding: 12px 24px; 
  border: none; 
  border-radius: 12px; 
  cursor: pointer; 
  font-weight: 600; 
  margin-left: 10px; 
}
.btn:hover { opacity: 0.9; }
.btn.danger { background: #ff6b6b; color: white; }

.table { overflow: auto; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px; background: rgba(255,255,255,.05); color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,.1); }
tr:hover td { background: rgba(255,255,255,.05); }

.price { font-weight: 600; color: var(--gold); }
.profit { font-weight: 600; color: #47e6a6; }

.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #47e6a6;
  color: black;
  padding: 16px 24px;
  border-radius: 12px;
  font-weight: 600;
  display: none;
}

@media (max-width: 768px) { .app { flex-direction: column; } .sidebar { width: 100%; order: 2; } .main { order: 1; } }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand">PDM ADMIN</div>
    <nav class="nav">
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="clients.html">👥 Clients</a>
      <a href="stock.html">📦 Stock</a>
      <a href="ventes.html">💰 Ventes</a>
      <a href="vehicles.html" class="active">🚗 Véhicules</a>
      <a href="partenariats.html">🤝 Partenaires</a>
      <a href="compta.html">💼 Comptabilité</a>
    </nav>
    <button class="btn" onclick="logout()">🚪 Déconnexion</button>
  </div>

  <div class="main">
    <div class="card">
      <h1>Base Véhicules</h1>
      <p style="color: var(--muted);">Prix achat/vente pour Stock & Ventes. Utilisé automatiquement.</p>

      <div class="grid">
        <input class="input" id="brandInput" placeholder="Marque (Ocelot)">
        <input class="input" id="modelInput" placeholder="Modèle (XA-21)">
        <input class="input" id="typeInput" placeholder="Type (Sport)">
        <input class="input" id="buyInput" type="number" placeholder="Prix achat $">
        <input class="input" id="sellInput" type="number" placeholder="Prix vente $">
        <button class="btn" onclick="addVehicle()">➕ Ajouter</button>
      </div>
    </div>

    <div class="card">
      <h2>Liste Véhicules</h2>
      <span style="color: var(--muted); font-size: 14px;" id="vehicleCount">0 véhicules</span>
      <div class="table">
        <table>
          <thead>
            <tr><th>Nom</th><th>Type</th><th>Prix Achat</th><th>Prix Vente</th><th>Marge</th><th>Actions</th></tr>
          </thead>
          <tbody id="vehiclesTable">
            <tr><td colspan="6">Aucun véhicule</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let vehicles = [
  {
    brand: 'Ocelot',
    model: 'XA-21',
    type: 'Sport',
    buy: 65000,
    sell: 120000
  },
  {
    brand: 'Pfister',
    model: 'Comet S2',
    type: 'Sport',
    buy: 45000,
    sell: 85000
  },
  {
    brand: 'Benefactor',
    model: 'Surron',
    type: 'Moto',
    buy: 8000,
    sell: 15000
  }
];

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 3000);
}

function formatMoney(n) {
  return '$' + n.toLocaleString();
}

function updateVehicles() {
  document.getElementById('vehicleCount').textContent = `${vehicles.length} véhicules`;

  const tbody = document.getElementById('vehiclesTable');
  tbody.innerHTML = vehicles.map((vehicle, index) => {
    const name = `${vehicle.brand} ${vehicle.model}`;
    const margin = vehicle.sell - vehicle.buy;
    const marginPct = ((margin / vehicle.buy) * 100).toFixed(1);
    return `
      <tr>
        <td><strong>${name}</strong></td>
        <td>${vehicle.type || '—'}</td>
        <td class="price">${formatMoney(vehicle.buy)}</td>
        <td class="price">${formatMoney(vehicle.sell)}</td>
        <td class="profit">+${formatMoney(margin)} (${marginPct}%)</td>
        <td>
          <button class="btn" onclick="editVehicle(${index})" style="padding:6px 12px;font-size:12px">✏️</button>
          <button class="btn danger" onclick="deleteVehicle(${index})" style="padding:6px 12px;font-size:12px">🗑️</button>
        </td>
      </tr>
    `;
  }).join('') || '<tr><td colspan="6">Aucun véhicule</td></tr>';
}

function addVehicle() {
  const brand = document.getElementById('brandInput').value.trim();
  const model = document.getElementById('modelInput').value.trim();
  const type = document.getElementById('typeInput').value.trim();
  const buy = parseInt(document.getElementById('buyInput').value) || 0;
  const sell = parseInt(document.getElementById('sellInput').value) || 0;

  if (!brand || !model || buy <= 0 || sell <= 0) {
    return showToast('Marque, modèle, prix achat ET vente requis !');
  }

  vehicles.push({brand, model, type, buy, sell});
  updateVehicles();
  showToast('Véhicule ajouté !');

  // Reset
  document.getElementById('brandInput').value = '';
  document.getElementById('modelInput').value = '';
  document.getElementById('typeInput').value = '';
  document.getElementById('buyInput').value = '';
  document.getElementById('sellInput').value = '';
}

function editVehicle(index) {
  const vehicle = vehicles[index];
  vehicle.brand = prompt('Marque :', vehicle.brand) || vehicle.brand;
  vehicle.model = prompt('Modèle :', vehicle.model) || vehicle.model;
  vehicle.type = prompt('Type :', vehicle.type) || vehicle.type;
  vehicle.buy = parseInt(prompt('Prix achat $ :', vehicle.buy)) || vehicle.buy;
  vehicle.sell = parseInt(prompt('Prix vente $ :', vehicle.sell)) || vehicle.sell;
  updateVehicles();
  showToast('Véhicule modifié !');
}

function deleteVehicle(index) {
  if (confirm('Supprimer ce véhicule ?')) {
    vehicles.splice(index, 1);
    updateVehicles();
    showToast('Véhicule supprimé !');
  }
}

function logout() {
  showToast('Déconnexion...');
}

showToast('PDM Véhicules chargé !');
updateVehicles();
</script>
</body>
</html>
