<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PDM Admin — Catalogue</title>
  <link rel="icon" href="favicon.png" />
  <link rel="stylesheet" href="app.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="module" src="catalogue.js"></script>
</head>

<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-title">PDM <span>ADMIN</span></div>
        <div class="brand-sub">Urban Hills</div>
      </div>

      <nav class="sidebar-nav">
        <a class="nav-link" href="dashboard.html"><span>Dashboard</span></a>
        <a class="nav-link" href="clients.html"><span>Clients</span></a>
        <a class="nav-link" href="stock.html"><span>Stock</span></a>
        <a class="nav-link" href="ventes.html"><span>Ventes</span></a>
        <a class="nav-link" href="vehicles.html"><span>Véhicules</span></a>
        <a class="nav-link" href="partenariats.html"><span>Partenaires</span></a>
        <a class="nav-link" href="compta.html"><span>Comptabilité</span></a>
        <a class="nav-link active" href="catalogue.html"><span>Catalogue</span></a>
        <a class="nav-link" href="gestion.html"><span>Gestion</span></a>
      </nav>

      <div class="sidebar-footer">
        <button id="logoutBtn" class="btn btn-gold w-full">Déconnexion</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <div class="page-info">
          <h1>Gestion Catalogue</h1>
          <p>Édition des véhicules affichés sur le site public (Admin-only)</p>
        </div>
        <div class="header-actions">
          <button id="exportCsvBtn" class="btn btn-outline">Exporter CSV</button>
          <button id="addVehicleBtn" class="btn btn-gold">Ajouter un véhicule</button>
        </div>
      </header>

      <div class="content-body" id="pageRoot">
        <div class="card">
          <div class="card-header">
            <div class="card-title">Liste des véhicules</div>
          </div>
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>Marque / Modèle</th>
                  <th>Type / Classe</th>
                  <th>Prix</th>
                  <th>Places / Vitesse</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="vehiclesTableBody">
                <!-- Dynamically populated -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- MODAL: ADD/EDIT VEHICLE -->
  <div id="vehicleModal" class="modal-overlay hidden">
    <div class="modal-container">
      <div class="modal-header">
        <h2 id="modalTitle">Ajouter un véhicule</h2>
      </div>
      <div class="modal-body">
        <form id="vehicleForm">
          <input type="hidden" id="vehicleId" />
          <div class="flex-row">
            <div class="form-group w-full">
              <label>Marque</label>
              <input type="text" id="brand" class="input" placeholder="ex: Pegassi" required />
            </div>
            <div class="form-group w-full">
              <label>Modèle</label>
              <input type="text" id="model" class="input" placeholder="ex: Zentorno" required />
            </div>
          </div>
          <div class="flex-row">
            <div class="form-group w-full">
              <label>Type</label>
              <input type="text" id="type" class="input" placeholder="ex: Super" required />
            </div>
            <div class="form-group w-full">
              <label>Classe</label>
              <input type="text" id="classe" class="input" placeholder="ex: S" required />
            </div>
          </div>
          <div class="flex-row">
            <div class="form-group w-full">
              <label>Prix (€)</label>
              <input type="number" id="price" class="input" placeholder="0" required />
            </div>
          </div>
          <div class="flex-row">
            <div class="form-group w-full">
              <label>Places</label>
              <input type="number" id="places" class="input" placeholder="2" required />
            </div>
            <div class="form-group w-full">
              <label>Vitesse Max (km/h)</label>
              <input type="number" id="vitessemax" class="input" placeholder="300" required />
            </div>
          </div>
          <div class="form-group">
            <label>Image du véhicule</label>
            <div class="flex-row">
              <select id="imageSourceType" class="input" style="width: auto;">
                <option value="url">URL</option>
                <option value="file">Fichier (PNG/JPG)</option>
              </select>
              <input type="url" id="urlimagevehicule" class="input w-full" placeholder="https://..." required />
              <input type="file" id="fileimagevehicule" class="input w-full hidden" accept="image/png, image/jpeg" />
            </div>
            <div id="uploadStatus" class="brand-sub" style="margin-top: 5px; font-size: 0.8em;"></div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button id="closeModalBtn" class="btn btn-outline">Annuler</button>
        <button id="saveVehicleBtn" class="btn btn-gold">Enregistrer</button>
      </div>
    </div>
  </div>
</body>
</html>
